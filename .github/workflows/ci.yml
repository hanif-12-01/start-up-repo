name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Laravel CI
    runs-on: ubuntu-latest

    env:
      APP_ENV: testing
      APP_DEBUG: "false"
      CACHE_STORE: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync
      DB_CONNECTION: sqlite
      DB_DATABASE: ":memory:"

    defaults:
      run:
        working-directory: wattwise-laravel

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── PHP ────────────────────────────────────────────────
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, xml, sqlite3, pdo_sqlite, bcmath, ctype, fileinfo, json, tokenizer
          coverage: none

      - name: Get Composer cache dir
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ hashFiles('wattwise-laravel/composer.lock') }}
          restore-keys: composer-

      - run: composer install --no-interaction --prefer-dist --no-progress

      # ── Node ───────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: wattwise-laravel/package-lock.json

      - run: npm ci

      # ── Laravel bootstrap ──────────────────────────────────
      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - run: php artisan optimize:clear

      # ── Backend checks ─────────────────────────────────────
      - name: PHP lint (Pint, changed files)
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"

            if [[ -z "$BASE_SHA" || "$BASE_SHA" =~ ^0+$ ]]; then
              BASE_SHA="$(git hash-object -t tree /dev/null)"
            fi
          fi

          echo "Pint comparison: ${BASE_SHA}..${HEAD_SHA}"

          git rev-parse --verify "$HEAD_SHA^{commit}"

          if ! [[ "$BASE_SHA" =~ ^0+$ ]]; then
            git cat-file -e "$BASE_SHA^{commit}" 2>/dev/null || true
          fi

          mapfile -t PHP_FILES < <(
            git diff --name-only --diff-filter=ACMRT "$BASE_SHA" "$HEAD_SHA" |
            grep '^wattwise-laravel/.*\.php$' |
            sed 's#^wattwise-laravel/##' || true
          )

          if [[ ${#PHP_FILES[@]} -eq 0 ]]; then
            echo "No changed Laravel PHP files to check."
            exit 0
          fi

          echo "Checking changed Laravel PHP files:"
          printf ' - %s\n' "${PHP_FILES[@]}"

          ./vendor/bin/pint --parallel --test "${PHP_FILES[@]}"

      - name: PHP static analysis (PHPStan)
        run: composer run types:check

      - name: PHPUnit tests
        run: php artisan test

      # ── Frontend checks ────────────────────────────────────
      - name: ESLint
        run: npm run lint:check

      - name: TypeScript (vue-tsc)
        run: npm run types:check

      - name: Vite production build
        run: npm run build

  secret-scan:
    name: Test Token and Gitleaks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Test token
        env:
          GH_TOKEN: ${{ secrets.MY_GITHUB_PAT }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "ERROR: Secret MY_GITHUB_PAT tidak ditemukan"
            exit 1
          fi

          gh api "repos/${GITHUB_REPOSITORY}" \
            --jq '"TOKEN BERHASIL! Repository: \(.full_name)"'

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.MY_GITHUB_PAT }}
